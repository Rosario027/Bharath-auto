<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120">
  <!-- Chip body -->
  <rect x="22" y="22" width="76" height="76" rx="8" fill="none" stroke="#1b1b1b" stroke-width="6"/>
  <!-- Pins -->
  <g fill="#1b1b1b">
    <!-- top -->
    <rect x="36" y="10" width="6" height="12" rx="1"/>
    <rect x="57" y="10" width="6" height="12" rx="1"/>
    <rect x="78" y="10" width="6" height="12" rx="1"/>
    <!-- bottom -->
    <rect x="36" y="98" width="6" height="12" rx="1"/>
    <rect x="57" y="98" width="6" height="12" rx="1"/>
    <rect x="78" y="98" width="6" height="12" rx="1"/>
    <!-- left -->
    <rect x="10" y="36" width="12" height="6" rx="1"/>
    <rect x="10" y="57" width="12" height="6" rx="1"/>
    <rect x="10" y="78" width="12" height="6" rx="1"/>
    <!-- right -->
    <rect x="98" y="36" width="12" height="6" rx="1"/>
    <rect x="98" y="57" width="12" height="6" rx="1"/>
    <rect x="98" y="78" width="12" height="6" rx="1"/>
  </g>
  <!-- House -->
  <g fill="none" stroke="#1b1b1b" stroke-width="5" stroke-linejoin="round" stroke-linecap="round">
    <path d="M40 60 L60 43 L80 60"/>
    <path d="M45 60 L45 80 L75 80 L75 60"/>
  </g>
  <rect x="55" y="68" width="10" height="12" fill="#1b1b1b"/>
</svg>
